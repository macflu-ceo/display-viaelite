<title>VIA ELITE · Store Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;700;800;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a1e15; color: #1c1c1c;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .display {
    width: 100vw; height: 100vh;
    background: #faf9f5;
    position: relative; overflow: hidden;
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  .slide .bg-image {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #f4f3ed 0%, #ecebe6 100%);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .slide .bg-image img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 60px 80px;
  }
  .slide .bg-image .placeholder {
    color: #c0bdb3; font-size: 18px; letter-spacing: 0.1em; text-align: center;
  }

  .top-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 22px 40px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(255,255,255,0));
    pointer-events: none;
  }
  .top-overlay .logo img {
    height: 30px; display: block;
    filter: brightness(0) saturate(100%) invert(15%) sepia(34%) saturate(1264%) hue-rotate(108deg) brightness(95%) contrast(89%);
  }
  .top-overlay .right-info {
    display: flex; align-items: center; gap: 24px;
    color: #1c3829; font-size: 11px; letter-spacing: 0.25em;
    text-transform: uppercase; font-family: 'Inter', sans-serif; font-weight: 600;
  }
  .top-overlay .live-dot {
    display: inline-block; width: 8px; height: 8px;
    background: #c0392b; border-radius: 50%; margin-right: 6px;
    animation: pulse 1.6s ease-in-out infinite; vertical-align: middle;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .slide .discount-badge {
    position: absolute; top: 90px; left: 40px;
    background: #1c3829; color: #fff;
    padding: 26px 44px 26px 36px;
    border-bottom-right-radius: 999px;
    border-top-right-radius: 999px;
    display: flex; align-items: baseline; gap: 6px;
    font-weight: 900; font-family: 'Inter', sans-serif;
    box-shadow: 0 12px 30px rgba(28, 56, 41, 0.35);
    z-index: 5;
  }
  .slide .discount-badge .num { font-size: 84px; line-height: 1; letter-spacing: -0.04em; }
  .slide .discount-badge .pct { font-size: 36px; line-height: 1; }
  .slide .discount-badge::after {
    content: 'OFF';
    position: absolute; bottom: 6px; right: 20px;
    font-size: 11px; letter-spacing: 0.3em; opacity: 0.6;
  }

  .slide .info-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 80px 60px 60px;
    background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(250,249,245,0.95) 35%, rgba(250,249,245,1) 100%);
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 60px; z-index: 5;
  }
  .slide .info-panel .info-left { flex: 1; }
  .slide .info-panel .title-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px; letter-spacing: 0.4em; text-transform: uppercase;
    color: #c0392b; font-weight: 800; margin-bottom: 16px;
  }
  .slide .info-panel .brand-line {
    display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px;
  }
  .slide .info-panel .brand-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 68px; font-weight: 700; color: #1c1c1c;
    letter-spacing: 0.02em; line-height: 1;
  }
  .slide .info-panel .brand-kr {
    font-size: 18px; color: #8a8174; font-weight: 500; letter-spacing: 0.1em;
  }
  .slide .info-panel .product-name {
    font-size: 19px; color: #555; font-weight: 500;
    letter-spacing: 0.02em; margin-bottom: 24px;
  }
  .slide .info-panel .prices {
    display: flex; align-items: baseline; gap: 24px;
  }
  .slide .info-panel .price-original {
    font-size: 20px; color: #999; text-decoration: line-through;
    text-decoration-color: #c0392b; font-weight: 500;
  }
  .slide .info-panel .price-block { display: flex; flex-direction: column; }
  .slide .info-panel .price-label {
    font-size: 12px; color: #1c3829; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px;
  }
  .slide .info-panel .price-sale {
    font-family: 'Inter', sans-serif;
    font-size: 64px; font-weight: 900;
    color: #1c1c1c; letter-spacing: -0.025em; line-height: 1;
  }
  .slide .info-panel .price-sale .won {
    font-size: 32px; margin-left: 6px; font-weight: 700;
  }

  .buy-btn {
    background: #1c3829; color: #fff;
    border: 0; padding: 26px 56px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 0.18em;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 16px 36px rgba(28, 56, 41, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: inline-flex; align-items: center; gap: 14px;
    white-space: nowrap;
  }
  .buy-btn:active { transform: scale(0.96); }
  .buy-btn .arrow { font-size: 24px; }

  .bottom-indicators {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 6;
  }
  .dot {
    width: 32px; height: 3px; border-radius: 2px;
    background: rgba(28, 56, 41, 0.2); overflow: hidden; position: relative;
  }
  .dot.active { background: rgba(28, 56, 41, 0.4); }
  .dot.active::after {
    content: ''; position: absolute; inset: 0;
    background: #1c3829; transform-origin: left;
    animation: fill 5s linear forwards;
  }
  @keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* === Login Overlay === */
  .login-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1c3829 0%, #0a1e15 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 40px;
  }
  .login-card {
    background: #faf9f5; border-radius: 16px;
    padding: 60px 50px; max-width: 480px; width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4); text-align: center;
  }
  .login-card .login-logo {
    height: 36px; margin: 0 auto 8px; display: block;
    filter: brightness(0) saturate(100%) invert(15%) sepia(34%) saturate(1264%) hue-rotate(108deg) brightness(95%) contrast(89%);
  }
  .login-card .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 700; color: #1c3829;
    letter-spacing: 0.06em; margin-top: 14px;
  }
  .login-card .login-sub {
    font-size: 12px; color: #777; margin-top: 4px;
    letter-spacing: 0.1em; margin-bottom: 32px;
  }
  .login-card form { display: flex; flex-direction: column; gap: 12px; }
  .login-card input {
    padding: 16px 18px; border: 1px solid #d8d3c7; border-radius: 10px;
    font-family: inherit; font-size: 16px; background: #fff;
  }
  .login-card input:focus { outline: none; border-color: #1c3829; }
  .login-card button[type=submit] {
    background: #1c3829; color: #fff; border: 0; padding: 16px;
    border-radius: 10px; font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 4px; letter-spacing: 0.1em;
  }
  .login-card button[type=submit]:active { transform: scale(0.98); }
  .login-error { color: #c0392b; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .login-footer { margin-top: 24px; font-size: 11px; color: #999; letter-spacing: 0.1em; }

  /* === Buy modal === */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(10, 30, 21, 0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 40px;
    backdrop-filter: blur(8px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #faf9f5; border-radius: 20px;
    padding: 56px 60px; max-width: 560px; width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5); text-align: center;
  }
  .modal .modal-eyebrow {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: 12px; letter-spacing: 0.4em; color: #c0392b;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; color: #1c3829; font-weight: 700;
    letter-spacing: 0.04em; margin-bottom: 12px;
  }
  .modal p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 32px; }
  .modal form { display: flex; flex-direction: column; gap: 14px; }
  .modal input {
    padding: 18px 22px; border: 1px solid #d8d3c7; border-radius: 12px;
    font-family: inherit; font-size: 17px; background: #fff;
  }
  .modal input:focus { outline: none; border-color: #1c3829; }
  .modal-btns { display: flex; gap: 10px; margin-top: 8px; }
  .modal-btns button {
    flex: 1; padding: 18px; border: 0; border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.08em;
  }
  .modal-btns .submit { background: #1c3829; color: #fff; }
  .modal-btns .cancel { background: #f0ede4; color: #1c3829; }
  .modal-footer { margin-top: 20px; font-size: 11px; color: #999; }

  .success-msg { color: #1c3829; padding: 30px; background: #e8f4ee; border-radius: 12px; display: none; }
  .success-msg.open { display: block; }
  .success-msg .icon { font-size: 48px; margin-bottom: 12px; }
  .success-msg .text { font-size: 17px; font-weight: 600; }

  /* === Empty state === */
  .empty-state {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #faf9f5; gap: 18px; padding: 40px;
  }
  .empty-state.show { display: flex; }
  .empty-state .icon { font-size: 64px; opacity: 0.3; }
  .empty-state .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; color: #1c3829; letter-spacing: 0.06em;
  }
  .empty-state .text { color: #888; font-size: 15px; letter-spacing: 0.05em; }
</style>
</head>

<!-- BUY MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div id="formArea">
      <div class="modal-eyebrow">CONCIERGE INQUIRY</div>
      <h2>구매 문의</h2>
      <p>아래에 정보를 남겨주시면<br>비아엘리떼 컨시어지가 곧 연락드립니다.</p>
      <form id="buyForm">
        <input type="text" id="name" placeholder="성함" required>
        <input type="tel" id="phone" placeholder="연락처 (예: 010-1234-5678)" required>
        <div class="modal-btns">
          <button type="button" class="cancel" onclick="closeBuyModal()">취소</button>
          <button type="submit" class="submit">제출</button>
        </div>
      </form>
      <div class="modal-footer">제출 정보는 비아엘리떼 컨시어지 영업에만 사용됩니다.</div>
    </div>
    <div class="success-msg" id="successMsg">
      <div class="icon">✓</div>
      <div class="text">접수되었습니다.<br>곧 컨시어지가 연락드립니다.</div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG (백엔드 연결 시 수정) =====
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNDbcLdK87-twc3VMgWZIUIzVLr7wMJoRQ04KyDypCjZjlH1_DVb0fesI8DjoEJ0ppsg/exec';
const SLIDE_DURATION = 5000; // 5초
const POLL_INTERVAL = 30000; // 30초마다 슬라이드 동기화

const isDemoMode = (APPS_SCRIPT_URL === 'YOUR_TABLET_APPS_SCRIPT_URL_HERE');

// ===== STATE =====
let slides = [];
let currentSlide = 0;
let autoTimer = null;
let currentUser = null;

// ===== LOGIN =====
function showDisplay() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('display').style.display = 'block';
}
function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('display').style.display = 'none';
  stopAuto();
}

async function doLogin(id, password) {
  if (isDemoMode) {
    // 데모 모드 — 아무 ID/비번 통과
    return { success: true, id, name: id };
  }
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'store_login', id, password })
  });
  return await res.json();
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '확인 중...';
  try {
    const result = await doLogin(id, pw);
    if (result.success) {
      currentUser = result;
      localStorage.setItem('viaelite_tablet_session', JSON.stringify(result));
      showDisplay();
      loadSlides();
    } else {
      errorEl.textContent = result.message || 'ID 또는 비밀번호가 일치하지 않습니다.';
    }
  } catch (err) {
    errorEl.textContent = '연결 오류: ' + err.message;
  }
});

// ===== SLIDES =====
async function loadSlides() {
  if (isDemoMode) {
    // 데모 슬라이드
    slides = [
      { id:1, titleEyebrow:'VIA ELITE', brandEn:'Balmain', brandKr:'발망', productName:'트위드 더블 자켓', original:3100000, sale:2047650, image:null, discount:34 },
      { id:2, titleEyebrow:'이번 주 추천', brandEn:'Miumiu', brandKr:'미우미우', productName:'마틀라세 크로스백', original:2500000, sale:1800000, image:null, discount:28 },
      { id:3, titleEyebrow:'CLOSING SOON', brandEn:'Saint Laurent', brandKr:'생로랑', productName:'리브 고슈 클러치', original:1200000, sale:860000, image:null, discount:29 }
    ];
    renderSlides();
    return;
  }
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=get_slides');
    const data = await res.json();
    if (data.success) {
      slides = data.slides || [];
      renderSlides();
    }
  } catch (err) {
    console.error('Failed to load slides:', err);
  }
}

function fmtWon(n) { return Number(n).toLocaleString('ko-KR') + '원'; }

function renderSlides() {
  const container = document.getElementById('slidesContainer');
  const dotsEl = document.getElementById('dots');
  const empty = document.getElementById('emptyState');

  if (!slides.length) {
    container.innerHTML = '';
    dotsEl.innerHTML = '';
    empty.classList.add('show');
    stopAuto();
    return;
  }
  empty.classList.remove('show');

  container.innerHTML = slides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}" data-idx="${i}">
      <div class="bg-image">
        ${s.image ? `<img src="${s.image}" alt="">` : `<div class="placeholder">상품 이미지 (어드민에서 등록)</div>`}
      </div>
      ${s.discount > 0 ? `<div class="discount-badge"><span class="num">${s.discount}</span><span class="pct">%</span></div>` : ''}
      <div class="info-panel">
        <div class="info-left">
          ${s.titleEyebrow ? `<div class="title-eyebrow">${s.titleEyebrow}</div>` : ''}
          <div class="brand-line">
            <span class="brand-en">${s.brandEn || ''}</span>
            <span class="brand-kr">${s.brandKr || ''}</span>
          </div>
          <div class="product-name">${s.productName || ''}</div>
          <div class="prices">
            ${s.original ? `<span class="price-original">${fmtWon(s.original)}</span>` : ''}
            <div class="price-block">
              <span class="price-label">비아엘리떼 컨시어지 가</span>
              <span class="price-sale">${Number(s.sale).toLocaleString('ko-KR')}<span class="won">원</span></span>
            </div>
          </div>
        </div>
        <button class="buy-btn" onclick="openBuyModal(${s.id})">구매하기 <span class="arrow">→</span></button>
      </div>
    </div>
  `).join('');

  dotsEl.innerHTML = slides.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
  currentSlide = 0;
  startAuto();
}

function showSlide(idx) {
  if (!slides.length) return;
  document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
    if (i === idx) { d.style.animation = 'none'; d.offsetHeight; d.style.animation = ''; }
  });
  currentSlide = idx;
}
function nextSlide() { if (slides.length) showSlide((currentSlide + 1) % slides.length); }
function prevSlide() { if (slides.length) showSlide((currentSlide - 1 + slides.length) % slides.length); }
function startAuto() { stopAuto(); if (slides.length > 1) autoTimer = setInterval(nextSlide, SLIDE_DURATION); }
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

// Touch swipe (개선: 임계값 낮추고 시간제한 추가, document 레벨 캡처)
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
const SWIPE_THRESHOLD = 30;
const SWIPE_TIME_LIMIT = 600;

document.addEventListener('touchstart', e => {
  if (document.getElementById('display').style.display === 'none') return;
  if (e.target.closest('.modal-bg, .login-overlay, .buy-btn')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
  stopAuto();
}, { passive: true });

document.addEventListener('touchend', e => {
  if (document.getElementById('display').style.display === 'none') return;
  if (e.target.closest('.modal-bg, .login-overlay, .buy-btn')) return;
  if (!touchStartTime) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (dt < SWIPE_TIME_LIMIT && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
    if (dx > 0) prevSlide(); else nextSlide();
  }
  touchStartTime = 0;
  startAuto();
}, { passive: true });

// Click left/right zones (PC test용)
document.getElementById('display').addEventListener('click', e => {
  if (e.target.closest('.buy-btn')) return;
  if (e.target.closest('.info-panel')) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < rect.width / 3) prevSlide();
  else if (x > rect.width * 2 / 3) nextSlide();
  startAuto();
});

// Time
function updateDateTime() {
  const now = new Date();
  const opts = { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
  document.getElementById('dateTime').textContent = now.toLocaleString('ko-KR', opts);
}
updateDateTime();
setInterval(updateDateTime, 30000);

// ===== Modal =====
let currentSlideForBuy = null;
function openBuyModal(slideId) {
  currentSlideForBuy = slideId;
  stopAuto();
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('formArea').style.display = 'block';
  document.getElementById('successMsg').classList.remove('open');
}
function closeBuyModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  startAuto();
}

document.getElementById('buyForm').addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const lead = { name, phone, storeId: currentUser?.id, slideId: currentSlideForBuy, time: new Date().toISOString() };
  if (!isDemoMode) {
    try {
      fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'save_lead', ...lead }) }).catch(() => {});
    } catch (e) {}
  } else {
    console.log('LEAD (demo):', lead);
  }
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('successMsg').classList.add('open');
  setTimeout(closeBuyModal, 3500);
});

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') closeBuyModal();
});

// ===== Auto-sync slides every 30s =====
setInterval(() => { if (currentUser) loadSlides(); }, POLL_INTERVAL);

// ===== Session check =====
(function init() {
  const raw = localStorage.getItem('viaelite_tablet_session');
  if (raw) {
    try {
      currentUser = JSON.parse(raw);
      showDisplay();
      loadSlides();
      return;
    } catch (e) {}
  }
  showLogin();
})();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
